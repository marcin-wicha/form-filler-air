<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Form Filler</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="../reset.css" />
</head>
<body>
    <div class="popup">
        <form class="form" id="form">
            <label name="API Key">
                <input required type="text" id="apiKey" placeholder="Enter your API key" />
            </label>
            <label name="Model">
                <select id="model">
                    <option value="">Select a model</option>
                    <option value="openai/gpt-4.1">GPT-4.1</option>
                    <option value="deepseek/DeepSeek-R1-0528">DeepSeek R1-0528</option>
                    <option value="ai21-labs/AI21-Jamba-1.5-Mini">AI21 Jamba 1.5 Mini</option>
                    <option value="microsoft/Phi-4-reasoning">Phi-4 Reasoning</option>
                </select>
            </label>
        </form>
        <div id="healthcheck" class="healthcheck hidden"><p>Setup is complete and ready to use &#x2705; </p></div>
    </div>
    <script src="../llm/system.js"></script>
    <script src="popup.js"></script>
</body>
</html>
