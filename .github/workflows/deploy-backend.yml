name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate-skip:
    runs-on: ubuntu-latest
    outputs:
      skip_deploy: ${{ steps.check.outputs.skip_deploy }}
    steps:
      - name: Evaluate deploy skip label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const skipLabel = "SKIP DEPLOY";

            if (context.eventName !== "push") {
              core.info("Event is not push, deployment will run.");
              core.setOutput("skip_deploy", "false");
              return;
            }

            const { owner, repo } = context.repo;
            const commit_sha = context.sha;
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha,
            });

            if (!response.data.length) {
              core.info("No pull request is associated with this commit, deployment will run.");
              core.setOutput("skip_deploy", "false");
              return;
            }

            const exactMergePr = response.data.find((pr) => pr.merge_commit_sha === commit_sha);
            const mergedPr = exactMergePr ?? response.data.find((pr) => pr.merged_at) ?? response.data[0];
            const hasSkipLabel = mergedPr.labels.some((label) => label.name === skipLabel);

            core.info(`Using PR #${mergedPr.number} to evaluate deploy label.`);
            core.info(
              hasSkipLabel
                ? `Found "${skipLabel}" label, deployment will be skipped.`
                : `Label "${skipLabel}" not found, deployment will run.`
            );
            core.setOutput("skip_deploy", hasSkipLabel ? "true" : "false");

  deploy:
    needs: evaluate-skip
    if: needs.evaluate-skip.outputs.skip_deploy != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.BACKEND_STACK_NAME }}
      BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      STAGE_NAME: ${{ vars.BACKEND_STAGE_NAME || 'prod' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Deploy backend
        run: bash ./deploy.sh
